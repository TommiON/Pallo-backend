name: Path Guard

on:
  push:
  pull_request:

jobs:
  guard-legacy-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on legacy folders
        shell: bash
        run: |
          set -euo pipefail

          legacy_files="$(git ls-files 'services/**' 'domainModel/**')"

          legacy_dirs=""
          if [[ -d services ]]; then
            legacy_dirs+="services\n"
          fi
          if [[ -d domainModel ]]; then
            legacy_dirs+="domainModel\n"
          fi

          if [[ -n "$legacy_files" ]]; then
            echo "Legacy paths detected. Use dataAccess/ and domainCore/ instead:"
            echo "$legacy_files"
            exit 1
          fi

          if [[ -n "$legacy_dirs" ]]; then
            echo "Legacy directories detected in repository root. Remove services/ and domainModel/."
            printf '%b' "$legacy_dirs"
            exit 1
          fi

          echo "Path guard passed: no tracked files under services/ or domainModel/."
